# RenderでWebサービスを作るときの設定ファイル（Blueprint）。
# Renderのダッシュボードで「New +」→「Blueprint」からこのリポジトリを選ぶと、
# この内容をもとに自動でサービスが作られます。
# （手動で「Web Service」を作る場合はこのファイルは使われず、ダッシュボード上で
#   Build CommandとStart Commandを直接入力すればOKです）
services:
  - type: web
    name: line-recipe-bot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-4o
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: OPENAI_IMAGE_QUALITY
        value: low
      - key: DAILY_LIMIT
        value: "3"
      - key: USAGE_FILE_PATH
        value: data/usage.json
